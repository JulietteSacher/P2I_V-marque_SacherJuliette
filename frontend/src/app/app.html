<header class="topbar">
  <div class="brand">
    <img src="/logo.png" alt="Logo V-Marque" class="logo" />
    <span class="title">V-Marque</span>
  </div>

  <nav class="nav">
    <a
      routerLink="/"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      Feuille de match
    </a>

    @if (currentMatchId) {
      <a
        [routerLink]="['/match', currentMatchId]"
        routerLinkActive="active"
      >
        Match
      </a>

      <a
        [routerLink]="['/match', currentMatchId, 'stats']"
        routerLinkActive="active"
      >
        Statistiques
      </a>
    } @else {
      <span class="nav-disabled">Match</span>
      <span class="nav-disabled">Statistiques</span>
    }
  </nav>
</header>

<main class="page-content">
  <router-outlet></router-outlet>
</main>
